  <!-- Chart.js and SheetJS (the only two external libraries this project
       uses). Both vendored locally in assets/ rather than loaded from a
       CDN so the dashboard opens reliably from a double-click with no

       this dashboard only ever WRITES .xlsx files from its own data --
       see exporter.js for the full rationale. -->
